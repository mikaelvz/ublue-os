modules:
  # Brave Browser
  - type: dnf
    repos:
      files:
        - https://brave-browser-rpm-release.s3.brave.com/brave-browser.repo
      cleanup: true
    install:
      packages:
        - brave-browser

  # Official Discord RPM
  - type: dnf
    install:
      packages:
        - https://discord.com/api/download?platform=linux&format=rpm

  # Official Visual Studio Code RPM
  - type: dnf
    install:
      packages:
        - https://code.visualstudio.com/sha/download?build=stable&os=linux-rpm-x64

  # Firefox Browser
  - type: script
    snippets:
      - "sudo dnf config-manager addrepo --id=mozilla --set=baseurl=https://packages.mozilla.org/rpm/firefox --set=gpgkey=https://packages.mozilla.org/rpm/firefox/signing-key.gpg --set=gpgcheck=1 --set=repo_gpgcheck=0 --set=priority=10"

  - type: dnf
    repos:
      files:
        remove:
          - mozilla
    install:
      packages:
        - firefox