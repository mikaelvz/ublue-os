modules:
  # Instal ectool package
  - type: dnf
    install:
      packages:
        - https://repos.fyralabs.com/terra43/chromium-ectool-0%3A55680f7-2.fc43.x86_64.rpm

  # Install fanspeed scripts and example configuration
  - type: files
    files:
      - source: system/ectool
        destination: /

  # Enable systemd service
  - type: systemd
    system:
      enabled:
        - ectool-fanspeed.service