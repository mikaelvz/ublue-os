modules:
  # Instal ectool package
  - type: dnf
    repos:
      copr:
        - ublue-os/staging
    install:
      packages:
        - fw-ectool

  # Install fanspeed scripts and example configuration
  - type: files
    files:
      - source: system/ectool
        destination: /

  # Enable systemd service
  - type: systemd
    system:
      enabled:
        - ectool-fanspeed.service