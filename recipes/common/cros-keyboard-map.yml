modules:
  # Install keyd
  - type: dnf
    repos:
      copr:
        - alternateved/keyd
    install:
      packages:
        - keyd

  # Enable keyd
  - type: systemd
    system:
      enabled:
        - keyd.service

  # Configure keyd
  - type: files
    files:
      - source: system/keyd
        destination: /

  - type: script
    snippets:
      - "git clone https://github.com/WeirdTreeThing/cros-keyboard-map /tmp/cros-keyboard-map"
      - "mkdir -p /etc/libinput"
      - "cp /tmp/cros-keyboard-map/local-overrides.quirks /etc/libinput/local-overrides.quirks"
